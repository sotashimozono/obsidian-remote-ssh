version: 2

updates:
  # npm — weekly, grouped into a single PR per ecosystem
  - package-ecosystem: npm
    directory: /plugin
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 3
    groups:
      dev-deps:
        dependency-type: development
        update-types: [minor, patch]
      prod-deps:
        dependency-type: production
        update-types: [minor, patch]
    labels:
      - dependencies
    ignore:
      # obsidian API: pin manually to match target Obsidian version
      - dependency-name: obsidian
        update-types: [version-update:semver-major, version-update:semver-minor]

  # GitHub Actions — monthly
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions

  # Go modules — weekly
  - package-ecosystem: gomod
    directory: /server
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - go

  # Docker base images — turn-key sshd container users deploy on
  # the remote (Phase D-α addition; covers alpine + openssh-server
  # CVE bumps). Kept weekly because base-image bumps are individually
  # noteworthy: a Dockerfile change ships to anyone running the
  # turn-key compose stack.
  - package-ecosystem: docker
    directory: /deploy/docker
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - build

  # Test sshd container (Phase D-α addition). Ephemeral — used by
  # `npm run test:integration` only — but a stale Dockerfile still
  # eats CI minutes during integration build, so keep it current.
  - package-ecosystem: docker
    directory: /docker/test-sshd
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
