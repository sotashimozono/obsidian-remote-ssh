name: Release

# One workflow, one trigger: every merge to main produces a release.
#
# Why not tag-trigger?
#   GitHub Actions deliberately suppresses workflow runs from events
#   created by GITHUB_TOKEN (anti-loop). The previous design split this
#   into release-on-merge.yml (push tag) → release.yml (tag-trigger),
#   and the tag-push handoff silently failed every time, falling back
#   to a release with no signed binaries and no grouped changelog.
#
# softprops/action-gh-release creates the tag *and* the release in a
# single API call when given `tag_name` + `target_commitish`, so we
# can drive the whole pipeline directly off `push: branches: [main]`.
# A `precheck` job reads `plugin/manifest.json` and short-circuits if
# the tag/release already exists, making re-runs idempotent.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write
  # Phase D-δ / F24: cosign keyless OIDC needs the runner to mint
  # an id-token for Sigstore's Fulcio CA. Read-only is enough — we
  # never write the token anywhere; cosign exchanges it for a
  # short-lived signing certificate.
  id-token: write

jobs:
  # ─── Precheck: read manifest version, skip if already released ───────────────
  # Idempotency guard. If main moves but manifest.json wasn't bumped
  # (e.g. docs-only merge that bypasses version-check.yml — currently
  # impossible, but defensive), or this workflow re-runs after a
  # successful release, we exit cleanly instead of double-tagging.
  precheck:
    name: Precheck
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      should_release: ${{ steps.gate.outputs.should_release }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read manifest version
        id: ver
        run: |
          v=$(jq -r '.version' plugin/manifest.json)
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Manifest version: $v"

      - name: Skip if release already exists
        id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          v="${{ steps.ver.outputs.version }}"
          if gh release view "$v" >/dev/null 2>&1; then
            echo "Release $v already exists — nothing to do."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          elif git rev-parse "refs/tags/$v" >/dev/null 2>&1; then
            echo "Tag $v exists but release does not — proceeding (release will reuse tag)."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "Will release $v."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  # ─── Gate: must pass tests before releasing ───────────────────────────────────
  test:
    name: Test gate
    needs: precheck
    if: needs.precheck.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugin
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: plugin/package-lock.json
      - run: npm ci
      - run: node node_modules/typescript/bin/tsc --noEmit
      - run: node node_modules/vitest/vitest.mjs run

  # ─── Phase D-δ / F24: build daemon binaries + cosign sign ────────────────────
  # Builds the 4-platform daemon binary set via `make -C server cross`,
  # computes a sha256 manifest, and signs each binary + the manifest
  # with cosign keyless (Sigstore OIDC, no key management). Output is
  # uploaded as a workflow artifact for the `release` job to attach to
  # the GitHub release.
  #
  # Why a separate job: the binaries are slow-ish to build (~30 s each
  # × 4) and the OIDC handshake with Fulcio is a network round-trip.
  # Splitting from the plugin-build keeps the test gate's feedback
  # fast and lets a server-build failure surface independently.
  server:
    name: Build + sign server binaries
    needs: [precheck, test]
    if: needs.precheck.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    outputs:
      manifest_sha256: ${{ steps.manifest.outputs.sha256 }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: false
      - uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.4.1

      - name: Build cross-platform daemon binaries
        run: make -C server cross

      - name: Build daemon-manifest.json (sha256 set)
        id: manifest
        working-directory: server/dist
        shell: bash
        run: |
          set -euo pipefail
          # Emit a JSON object {filename: sha256} the plugin-side
          # verifier can consume to tie a downloaded binary back to
          # the cosign-signed digest. Sorted keys for deterministic
          # output across runs.
          {
            echo '{'
            first=1
            for f in obsidian-remote-server-*; do
              sha=$(sha256sum "$f" | awk '{print $1}')
              if [ $first -eq 1 ]; then first=0; else echo ','; fi
              printf '  "%s": "%s"' "$f" "$sha"
            done
            echo
            echo '}'
          } > daemon-manifest.json
          # Echo to logs for transparency.
          cat daemon-manifest.json
          # Also expose the manifest's own sha256 as a job output
          # so downstream consumers can pin-verify the manifest itself.
          echo "sha256=$(sha256sum daemon-manifest.json | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Cosign sign each binary + the manifest (keyless)
        working-directory: server/dist
        env:
          # Tell cosign to use the workflow's GitHub OIDC token
          # against Sigstore's public Fulcio + Rekor. No keys to
          # manage; signatures verifiable later via:
          #   cosign verify-blob --bundle <bundle> \
          #     --certificate-identity-regexp '…' \
          #     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
          #     <binary>
          COSIGN_YES: 'true'
        run: |
          set -euo pipefail
          for f in obsidian-remote-server-* daemon-manifest.json; do
            echo "Signing $f"
            cosign sign-blob --yes --bundle "$f.bundle" "$f"
          done
          ls -1

      - name: Upload signed server bundle
        uses: actions/upload-artifact@v7
        with:
          name: server-binaries
          path: server/dist/
          if-no-files-found: error
          retention-days: 7

  # ─── Build + publish release ─────────────────────────────────────────────────
  # softprops/action-gh-release creates the tag (`tag_name`) targeting
  # `target_commitish` *and* the release in one API call. No separate
  # `git tag` / `git push` step — that's what broke the previous design.
  release:
    name: Publish release
    needs: [precheck, test, server]
    if: needs.precheck.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # needed for changelog generation

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: plugin/package-lock.json

      - name: Install plugin deps
        working-directory: plugin
        run: npm ci

      - name: Production build
        working-directory: plugin
        run: node esbuild.config.mjs production

      - name: Download signed server binaries
        uses: actions/download-artifact@v6
        with:
          name: server-binaries
          path: server/dist/

      - name: Verify bundle size
        working-directory: plugin
        run: |
          SIZE=$(stat -c%s main.js)
          KB=$(( SIZE / 1024 ))
          echo "Bundle: ${KB} KB"
          if [ $SIZE -gt 614400 ]; then
            echo "::error::Bundle ${KB} KB exceeds 600 KB limit"
            exit 1
          fi

      - name: Generate changelog (git-cliff, grouped by Conventional Commits type)
        id: changelog
        # `--unreleased` (NOT `--latest`): the new tag for this run
        # doesn't exist at this step — softprops creates it below —
        # so `--latest` would resolve to the *previous* tag and emit
        # the *previous* version's changelog (broken in 0.4.61). We
        # want everything between the most recent tag and HEAD, which
        # is exactly what `--unreleased` returns. `--tag` lets git-cliff
        # show the about-to-be-created version in headings.
        # `--strip header` drops cliff's own `# Changelog` header so
        # the body slots cleanly under the "## What's changed" line
        # the release body builds below.
        # cliff.toml at repo root holds the grouping config (✨ Features
        # / 🐛 Bug Fixes / 🚧 CI / etc.) and the Dependabot-noise
        # suppression.
        #
        # Pinned to @v4 (not @v3): @v3's Dockerfile sits on the
        # Debian Buster base image, and Buster reached EOL in
        # 2024-06 — `deb.debian.org` now returns 404 for its
        # `apt-get install jq` step, breaking every release run.
        # @v4 is on a current Debian base.
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --unreleased --tag ${{ needs.precheck.outputs.version }} --strip header

      - name: Create GitHub Release (creates tag too)
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.precheck.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.precheck.outputs.version }}
          # Body = the git-cliff changelog only. Install + cosign verify
          # boilerplate lives in README.md / SECURITY.md (single source
          # of truth); reproducing it in every release body just buries
          # the actual changes under 30 lines of identical noise.
          body: ${{ steps.changelog.outputs.content }}
          files: |
            plugin/main.js
            plugin/manifest.json
            plugin/styles.css
            server/dist/obsidian-remote-server-linux-amd64
            server/dist/obsidian-remote-server-linux-amd64.bundle
            server/dist/obsidian-remote-server-linux-arm64
            server/dist/obsidian-remote-server-linux-arm64.bundle
            server/dist/obsidian-remote-server-darwin-amd64
            server/dist/obsidian-remote-server-darwin-amd64.bundle
            server/dist/obsidian-remote-server-darwin-arm64
            server/dist/obsidian-remote-server-darwin-arm64.bundle
            server/dist/daemon-manifest.json
            server/dist/daemon-manifest.json.bundle
          draft: false
          # Pre-1.0 we publish everything as pre-release for visibility,
          # matching the prior release-on-merge.yml IS_PRERELEASE='true'
          # behavior. Flip this to `contains(needs.precheck.outputs.version, '-')`
          # once the plugin reaches 1.0.
          prerelease: true
          make_latest: true
