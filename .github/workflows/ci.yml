name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Lint + type-check ───────────────────────────────────────────────────────
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugin
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: plugin/package-lock.json
      - run: npm ci
      - name: TypeScript type-check
        run: node node_modules/typescript/bin/tsc --noEmit
      # ESLint is wired up but config is optional; skip if no config file
      - name: Lint (if eslint config present)
        run: |
          if [ -f "eslint.config.mjs" ] || [ -f ".eslintrc*" ] || [ -f ".eslintrc.json" ]; then
            node node_modules/.bin/eslint src --ext .ts
          else
            echo "No ESLint config found — skipping"
          fi

  # ─── Unit tests (matrix: ubuntu / macos / windows) ───────────────────────────
  # Phase B1 — catches OS-specific regressions: path separators, line
  # endings, fs.symlink fallback (Windows w/o developer mode), os.hostname()
  # quirks. Coverage is only uploaded from ubuntu — uploading the same
  # report 3× would just thrash Codecov's dedup.
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: plugin
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: plugin/package-lock.json
      - run: npm ci
      # Coverage is only useful from one OS; run plain `vitest` on the
      # others so we don't pay the instrumentation cost everywhere.
      - name: Run tests with coverage
        if: matrix.os == 'ubuntu-latest'
        run: node node_modules/vitest/vitest.mjs run --coverage
      - name: Run tests
        if: matrix.os != 'ubuntu-latest'
        run: node node_modules/vitest/vitest.mjs run
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v6
        with:
          # Explicit slug avoids fork/PR ambiguity — Codecov's auto-
          # detection can mis-route uploads from PRs opened from forks.
          slug: sotashimozono/obsidian-remote-ssh
          files: plugin/coverage/lcov.info
          # Namespace under "plugin" so a future server-side Go
          # coverage upload can sit beside it without collision.
          flags: plugin
          # Coverage is informational, not gating: a flake in the
          # Codecov upload (transient 5xx, rate limit) shouldn't fail
          # otherwise-passing CI runs.
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ─── Production build + bundle size guard (matrix) ───────────────────────────
  # Build runs on every OS — cheap, catches esbuild platform issues. The
  # bundle artifact is uploaded only from ubuntu (per-OS uploads would
  # collide on the same artifact name).
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: plugin
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: plugin/package-lock.json
      - run: npm ci
      - name: Production build
        run: node esbuild.config.mjs production
      - name: Bundle size guard (< 600 KB)
        # Use Node for stat so the script works identically on
        # ubuntu/macos/windows (GNU `stat -c%s` and BSD `stat -f%z`
        # diverge; PowerShell's `Get-Item` is a third dialect). Inline
        # `node -e` argument lives in a block scalar so colons inside
        # the printed strings don't confuse the YAML parser.
        shell: bash
        run: |
          node -e '
          const fs = require("fs");
          const size = fs.statSync("main.js").size;
          const kb = Math.round(size / 1024);
          console.log("Bundle: " + kb + " KB");
          if (size > 614400) {
            console.error("::error::Bundle " + kb + " KB exceeds 600 KB limit — check for unwanted large deps");
            process.exit(1);
          }'
      - name: Upload build artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: plugin-build
          path: |
            plugin/main.js
            plugin/manifest.json
            plugin/styles.css
          retention-days: 7

  # ─── Server: build + test ────────────────────────────────────────────────────
  server:
    name: Server build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          # Cache enables once server/go.sum exists (added when external deps
          # are introduced). Until then, the module has only stdlib references.
          cache: false
      - name: Build
        run: make build
      - name: Test
        run: make test

  # ─── Deploy: docker image build smoke ────────────────────────────────────────
  # Builds the turn-key sshd container so a regression in the
  # Dockerfile / entrypoint surfaces here rather than when a user
  # actually tries to deploy. We don't push the image — just build.
  deploy-docker:
    name: Deploy docker image build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - name: Build deploy/docker image
        uses: docker/build-push-action@v7
        with:
          context: deploy/docker
          push: false
          tags: obsidian-remote-sshd:ci
